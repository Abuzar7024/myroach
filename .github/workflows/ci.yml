name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check, lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
        # Non-blocking for now: the codebase has pre-existing strict-Next lint
        # violations tracked in AUDIT_AND_REQUIREMENTS.md (L8). Flip to blocking
        # once they are cleaned up.
        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          # Public config — add these as GitHub repository *variables*
          # (Settings → Secrets and variables → Actions → Variables). They are
          # NEXT_PUBLIC_ (client-exposed) so repository variables are fine.
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_CHECK_RECAPTCHA_SITE_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_CHECK_RECAPTCHA_SITE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_ADMIN_PANEL_URL: ${{ vars.NEXT_PUBLIC_ADMIN_PANEL_URL }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ vars.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          NEXT_PUBLIC_CURRENCY: "INR"
          NEXT_PUBLIC_USE_MOCK_DATA: "false"

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

# Deployment (CD) is handled by Vercel's Git integration:
#   - Pushes to `main` → Production deploy
#   - Pull requests    → Preview deploy
# Configure env vars in the Vercel project settings (see AUDIT_AND_REQUIREMENTS.md §6).
